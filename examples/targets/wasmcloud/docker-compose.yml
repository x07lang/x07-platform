services:
  nats:
    image: nats:2.12.4-alpine
    command:
      - "--js"
      - "--http_port=8222"
    ports:
      - "4222:4222"
      - "8222:8222"

  registry:
    image: registry:2.8.3
    expose:
      - "5000"
    volumes:
      - ./registry-config/config.yml:/etc/docker/registry/config.yml:ro

  gateway:
    image: caddy:2.10.2-alpine
    depends_on:
      - registry
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "17443:17443"
      - "15443:15443"
    expose:
      - "5443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${X07LP_DEV_CERT_DIR:-./certs/out}:/certs:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ${X07LP_OTLP_EXPORT_HOST_DIR:-./otel-output}:/var/lib/x07lp-otel

  wasmcloud:
    image: wasmcloud/wasmcloud:1.9.2
    depends_on:
      - nats
      - otel-collector
      - gateway
    environment:
      WASMCLOUD_LATTICE: default
      WASMCLOUD_NATS_HOST: nats
      WASMCLOUD_NATS_PORT: "4222"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      WASMCLOUD_OCI_REGISTRY: gateway:5443
      WASMCLOUD_OCI_REGISTRY_USER: x07lp-oci-dev-user
      WASMCLOUD_OCI_REGISTRY_PASSWORD: x07lp-oci-dev-pass
      WASMCLOUD_TLS_CA_PATH: /etc/x07lp/certs/dev-ca.pem
    ports:
      - "4000:4000"
      - "26000-26255:26000-26255"
    volumes:
      - ${X07LP_DEV_CERT_DIR:-./certs/out}/dev-ca.pem:/etc/x07lp/certs/dev-ca.pem:ro

  wadm:
    image: ghcr.io/wasmcloud/wadm:0.21.1
    depends_on:
      - nats
    environment:
      WADM_NATS_SERVER: nats://nats:4222
      WADM_LATTICE: default
